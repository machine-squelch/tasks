# app.yaml - DigitalOcean App Platform specification
# Place this in your repository root

name: dluxe-task-tracker
region: sfo3  # Change to your preferred region (nyc, sfo3, ams, sgp, lon, fra, tor, blr)

services:
  - name: api
    environment_slug: node-js
    github:
      repo: YOUR_GITHUB_USERNAME/dluxe-task-tracker  # Update with your repo
      branch: main
      deploy_on_push: true
    
    # Build configuration
    build_command: npm install
    run_command: npm start
    
    # Resource sizing (adjust based on needs)
    instance_size_slug: basic-xxs  # $5/month - perfect for small teams
    instance_count: 1
    
    # HTTP configuration
    http_port: 8080
    
    # Environment variables
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /workspace/data/tasks.db
    
    # Health check
    health_check:
      http_path: /api/health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # Routes
    routes:
      - path: /

